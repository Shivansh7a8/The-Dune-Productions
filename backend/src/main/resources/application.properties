spring.application.name=duneverse-api
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/duneverse
spring.datasource.username=postgr
spring.datasource.password=Coders@123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Seed sample job openings on startup if table empty (handled via data.sql)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
